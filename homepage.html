<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNiDAYS Next - Homepage</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="topbar">
  <h1 class="logo">UNiDAYS <span class="small">Next</span></h1>

  <nav class="nav">
    <a href="#categories">Categories</a>
    <a href="#deals">Deals</a>
    <a href="#verify">Verify</a>
  </nav>

  <div class="top-actions">
    <button class="btn btn-ghost" type="button">Log in</button>
    <button class="btn btn-main" type="button">Sign up</button>
  </div>
</header>
<section class="banner">
  <canvas id="introCanvas"></canvas>

  <div class="banner-content">
    <p class="tag">Student discounts • rebrand concept</p>
    <h2>Find student deals quicker.</h2>
    <p class="sub">
      This is a redesign idea for UNiDAYS with a cleaner layout and small interactive elements.
    </p>

    <div class="banner-buttons">
      <button class="btn btn-main" type="button">Explore deals</button>
      <button class="btn btn-ghost" type="button">How it works</button>
    </div>

    <div class="search-box">
      <label for="searchInput">Search deals (simple filter):</label>
      <input id="searchInput" type="text" placeholder="Try: Nike, Apple, Food..." />
      <button id="clearBtn" class="btn btn-ghost" type="button">Clear</button>
      <p id="resultsMsg" class="hint"></p>
    </div>
  </div>
</section>


</body>
</html>
